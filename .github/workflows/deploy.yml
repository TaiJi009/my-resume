name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 或者你的默认分支名

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 添加写权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./